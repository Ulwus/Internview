spring.application.name=gateway
server.port=8080

# ── Actuator Health ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Spring Cloud/Boot uyumsuzluğunda bazı Spring Cloud auto-config'leri (MVC/JPA gibi opsiyonel modülleri)
# classpath'te bulamayınca context init sırasında patlayabiliyor. Gateway için bunlar zorunlu değil.
spring.autoconfigure.exclude=org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration,org.springframework.cloud.autoconfigure.RefreshAutoConfiguration

# Tutarlı actuator base path (varsayılan: /actuator)
# management.endpoints.web.base-path=/actuator

# ── Upstream servis URL'leri (override edilebilir) ──────
gateway.services.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
gateway.services.user.url=${USER_SERVICE_URL:http://localhost:8082}
gateway.services.interview.url=${INTERVIEW_SERVICE_URL:http://localhost:8083}
gateway.services.booking.url=${BOOKING_SERVICE_URL:http://localhost:8084}

# ── Gateway Basic Auth (env ile override) ────────────────
# NOT: Bu auth sadece config'te BasicAuth filtresi eklenen route'lara uygulanır.
gateway.security.basic-auth.user=${GATEWAY_BASIC_AUTH_USER:gateway}
gateway.security.basic-auth.password=${GATEWAY_BASIC_AUTH_PASSWORD:gateway}

# ── Rate limiting (Redis) ────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Routes ──────────────────────────────────────────────
# auth-service controller'larinda class-level @RequestMapping YOK (/register, /login dogrudan root'ta),
# bu yuzden gateway'den gelen /auth/login -> StripPrefix=1 ile /login olarak forward edilir.
spring.cloud.gateway.server.webflux.routes[0].id=auth
spring.cloud.gateway.server.webflux.routes[0].uri=${gateway.services.auth.url}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

# booking-service: /experts/me/availability/** (booking-service'deki AvailabilityController'a gidiyor)
# Bu route /experts/** user route'undan ONCE yazilmali (daha spesifik match)
spring.cloud.gateway.server.webflux.routes[1].id=experts-availability
spring.cloud.gateway.server.webflux.routes[1].uri=${gateway.services.booking.url}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/experts/me/availability/**

# booking-service: /availability/** (AvailabilityController.listOpen)
spring.cloud.gateway.server.webflux.routes[2].id=availability
spring.cloud.gateway.server.webflux.routes[2].uri=${gateway.services.booking.url}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/availability/**

# booking-service: /bookings/** (BookingController @RequestMapping("/bookings"))
# StripPrefix YOK: downstream controller zaten /bookings prefix'ini bekliyor.
spring.cloud.gateway.server.webflux.routes[3].id=booking
spring.cloud.gateway.server.webflux.routes[3].uri=${gateway.services.booking.url}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/bookings/**

# user-service: /users/** (UserController @RequestMapping("/users"))
spring.cloud.gateway.server.webflux.routes[4].id=user
spring.cloud.gateway.server.webflux.routes[4].uri=${gateway.services.user.url}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/users/**

# user-service: /experts/** (ExpertController @RequestMapping("/experts"))
spring.cloud.gateway.server.webflux.routes[5].id=experts
spring.cloud.gateway.server.webflux.routes[5].uri=${gateway.services.user.url}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/experts/**

# user-service: /skills/** (SkillController @RequestMapping("/skills"))
spring.cloud.gateway.server.webflux.routes[6].id=skills
spring.cloud.gateway.server.webflux.routes[6].uri=${gateway.services.user.url}
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/skills/**

# user-service: /industries/** (IndustryController @RequestMapping("/industries"))
spring.cloud.gateway.server.webflux.routes[7].id=industries
spring.cloud.gateway.server.webflux.routes[7].uri=${gateway.services.user.url}
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/industries/**

# interview-service: /interviews/** (service henuz implement edilmedi, StripPrefix=1 placeholder)
spring.cloud.gateway.server.webflux.routes[8].id=interview
spring.cloud.gateway.server.webflux.routes[8].uri=${gateway.services.interview.url}
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/interviews/**
spring.cloud.gateway.server.webflux.routes[8].filters[0]=StripPrefix=1

# ── Logging ─────────────────────────────────────────────
logging.level.io.internview.gateway=INFO
