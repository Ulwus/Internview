spring.application.name=booking-service
server.port=8084

# ── PostgreSQL ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:internview}
spring.datasource.username=${POSTGRES_USER:internview}
spring.datasource.password=${POSTGRES_PASSWORD:internview_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ──────────────────────────────────────────────
# Aynı veritabanında auth/user/booking servislerinin migration'ları çakışmasın
# diye her servis kendi schema history tablosunu yönetir.
spring.flyway.enabled=true
spring.flyway.table=flyway_schema_history_booking
spring.flyway.baseline-on-migrate=true

# ── Redis ───────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Security / JWT ──────────────────────────────────────
# auth-service ile paylaşılan HMAC secret. Production'da secret manager'dan okunmalı.
auth.jwt.secret=${AUTH_JWT_SECRET:dev-only-super-secret-change-me-dev-only-super-secret-change-me}

# ── Booking Lock ────────────────────────────────────────
# Aynı slot üzerinde yarış oluşmasını engelleyen distributed lock TTL (saniye).
booking.lock.ttl-seconds=15

# ── Actuator Health ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
