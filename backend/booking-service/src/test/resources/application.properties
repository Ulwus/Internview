spring.application.name=booking-service-test

# ── H2 ──────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:booking_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ── Flyway (test için kapalı) ───────────────────────────
spring.flyway.enabled=false

# ── Redis auto-config devre dışı (testlerde mock) ───────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── Security / JWT ──────────────────────────────────────
auth.jwt.secret=test-only-super-secret-change-me-test-only-super-secret-change-me

# ── Booking Lock ────────────────────────────────────────
booking.lock.ttl-seconds=5
