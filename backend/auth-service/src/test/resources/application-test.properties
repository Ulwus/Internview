# In-memory H2 (PostgreSQL uyumlu) — CI'da Docker yokken Testcontainers yerine
spring.datasource.url=jdbc:h2:mem:internview;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

auth.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
auth.jwt.access-token-ttl-seconds=3600
auth.jwt.refresh-token-ttl-seconds=1209600
