spring.application.name=auth-service
server.port=8081

# ── PostgreSQL ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:internview}
spring.datasource.username=${POSTGRES_USER:internview}
spring.datasource.password=${POSTGRES_PASSWORD:internview_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ──────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration

# ── JWT (HS256; prod: AUTH_JWT_SECRET min 32 byte) ──────
auth.jwt.secret=${AUTH_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
auth.jwt.access-token-ttl-seconds=${AUTH_ACCESS_TOKEN_TTL_SECONDS:3600}
auth.jwt.refresh-token-ttl-seconds=${AUTH_REFRESH_TOKEN_TTL_SECONDS:1209600}

# ── Actuator Health ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
