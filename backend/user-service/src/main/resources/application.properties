spring.application.name=user-service
server.port=8082

# ── PostgreSQL ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:internview}
spring.datasource.username=${POSTGRES_USER:internview}
spring.datasource.password=${POSTGRES_PASSWORD:internview_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ──────────────────────────────────────────────
# auth-service ile aynı DB'yi paylaştığı için ayrı history tablosu ve baseline kullanıyoruz
spring.flyway.enabled=true
spring.flyway.table=flyway_schema_history_user
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ── Actuator Health ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# ── JWT ─────────────────────────────────────────────────
# auth-service ile aynı secret kullanılmalı
auth.jwt.secret=${AUTH_JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
